# Build the JOSS paper.md to PDF on every push so the draft stays compilable.
# JOSS uses its own docker container `openjournals/inara` to render papers.
on:
  push:
    branches: [main, master]
    paths: ['paper/**']
  workflow_dispatch:

name: joss-paper

jobs:
  paper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build draft PDF
        uses: openjournals/openjournals-draft-action@master
        with:
          journal: joss
          paper-path: paper/paper.md
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: paper
          path: paper/paper.pdf
